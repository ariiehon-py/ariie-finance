<!DOCTYPE html>
<html>
<head>
    <title>Gembok Keuangan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20%; background-color: #f4f4f9; }
        .login-box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 80%; max-width: 300px; }
        input { padding: 10px; margin: 15px 0; width: 90%; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;}
        p { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Arie Finance</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="Masukkan Password..." required>
            <button type="submit">Masuk</button>
        </form>
        {% if error %}
        <p>{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
